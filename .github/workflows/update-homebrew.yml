name: Update Homebrew Cask

on:
  release:
    types: [published]

jobs:
  update-cask:
    runs-on: ubuntu-latest
    steps:
      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Download DMG and compute SHA256
        id: sha
        run: |
          curl -fSL -o OCO-arm64.dmg \
            "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/OCO-arm64.dmg"
          echo "sha256=$(sha256sum OCO-arm64.dmg | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Checkout homebrew-tap
        uses: actions/checkout@v4
        with:
          repository: rapidrabbit76/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}

      - name: Update Casks/oco.rb
        run: |
          cat > Casks/oco.rb << 'CASK'
          cask "oco" do
            version "${{ steps.version.outputs.version }}"
            sha256 "${{ steps.sha.outputs.sha256 }}"

            url "https://github.com/rapidrabbit76/omni-cli-overlay/releases/download/v#{version}/OCO-arm64.dmg"
            name "OCO"
            desc "Floating desktop overlay for OpenAI Codex CLI"
            homepage "https://github.com/rapidrabbit76/omni-cli-overlay"

            depends_on macos: ">= :ventura"

            app "OCO.app"

            zap trash: [
              "~/.config/oco",
            ]
          end
          CASK
          sed -i 's/^          //' Casks/oco.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/oco.rb
          git commit -m "Update OCO to ${{ steps.version.outputs.version }}"
          git push
